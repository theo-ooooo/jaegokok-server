<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>재고콕 — 로그인</title>
<link rel="stylesheet" href="assets/jaegokkok.css">
<style>
  html, body { height: 100%; }
  body { background: var(--bg-alt); display: flex; min-height: 100%; }

  .split { display: flex; width: 100%; min-height: 100vh; }

  /* left brand panel (desktop only) */
  .brand-panel { flex: 1.05; background: var(--brand); color: #fff; position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: space-between; padding: 48px 52px; }
  .brand-panel::after { content: ""; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 34px 34px; opacity: .6; pointer-events: none; }
  .brand-panel > * { position: relative; z-index: 1; }
  .bp-logo { display: flex; align-items: center; gap: 13px; }
  .bp-logo .wm { line-height: 1; }
  .bp-logo .wm .ko { font-weight: 900; font-size: 22px; letter-spacing: -.02em; }
  .bp-logo .wm .en { font-size: 10px; font-weight: 700; letter-spacing: .22em; color: rgba(255,255,255,.6); margin-top: 5px; display: block; }
  .bp-mid h2 { font-size: clamp(30px, 3.4vw, 44px); font-weight: 900; line-height: 1.12; letter-spacing: -.03em; margin: 0 0 18px; }
  .bp-mid p { font-size: 16px; line-height: 1.7; color: rgba(255,255,255,.78); max-width: 36ch; margin: 0; }
  .bp-feats { display: grid; gap: 14px; margin-top: 34px; }
  .bp-feat { display: flex; align-items: center; gap: 12px; font-size: 14.5px; color: rgba(255,255,255,.9); }
  .bp-feat .ck { width: 26px; height: 26px; flex: none; border-radius: 8px; background: rgba(255,255,255,.16);
    display: flex; align-items: center; justify-content: center; }
  .bp-foot { font-size: 12px; color: rgba(255,255,255,.55); font-family: var(--font-mono); }

  /* right form panel */
  .form-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
  .form-card { width: 100%; max-width: 380px; }
  .form-card .mobile-logo { display: none; }
  .form-card h1 { font-size: 24px; font-weight: 900; letter-spacing: -.02em; margin: 0 0 6px; color: var(--text-primary); }
  .form-card .sub { font-size: 14px; color: var(--text-secondary); margin: 0 0 26px; }

  /* role tabs */
  .roletabs { display: flex; gap: 8px; background: var(--bg-alt); border: 1px solid var(--border); padding: 5px; border-radius: var(--r-3); margin-bottom: 24px; }
  .roletab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 11px 8px; border: 0; cursor: pointer;
    border-radius: var(--r-2); background: transparent; color: var(--text-secondary); font-family: var(--font-sans); transition: all .18s var(--ease-out); }
  .roletab .rt-t { font-weight: 700; font-size: 14px; }
  .roletab .rt-d { font-size: 11px; color: var(--text-tertiary); }
  .roletab.on { background: var(--bg-card); color: var(--brand); box-shadow: var(--shadow-rest); }
  .roletab.on .rt-d { color: var(--brand-soft); }

  .form-fields { display: grid; gap: 16px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-secondary); }
  .checkbox input { width: 17px; height: 17px; accent-color: var(--brand); cursor: pointer; }
  .link { font-size: 13px; color: var(--brand); text-decoration: none; font-weight: 600; }
  .link:hover { color: var(--brand-strong); text-decoration: underline; }
  .signup { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 22px; }

  @media (max-width: 820px) {
    .brand-panel { display: none; }
    .form-card .mobile-logo { display: flex; align-items: center; gap: 11px; justify-content: center; margin-bottom: 26px; }
    .form-card .mobile-logo .ko { font-weight: 900; font-size: 21px; letter-spacing: -.02em; }
    .form-card h1, .form-card .sub { text-align: center; }
  }
</style>
</head>
<body>
<div class="split">

  <!-- BRAND PANEL -->
  <aside class="brand-panel">
    <div class="bp-logo">
      <svg width="38" height="38" viewBox="0 0 64 64"><rect x="7" y="7" width="50" height="50" rx="13" fill="#fff"/><path d="M19 33 l9 9 l17 -19" fill="none" stroke="var(--brand)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="wm"><span class="ko">재고콕</span><span class="en">JAEGOKKOK</span></span>
    </div>

    <div class="bp-mid">
      <h2>QR 하나로<br>재고 끝.</h2>
      <p>상품에 QR을 붙이고, 스캔만 하면 입출고 기록. 별도 장비 없이 스마트폰으로 시작하세요.</p>
      <div class="bp-feats">
        <div class="bp-feat"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg></span>QR 스캔으로 3초 입출고</div>
        <div class="bp-feat"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg></span>저재고 자동 알림</div>
        <div class="bp-feat"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg></span>직원 계정·권한 관리</div>
      </div>
    </div>

    <div class="bp-foot">© 2026 재고콕 · 해와달 카페</div>
  </aside>

  <!-- FORM PANEL -->
  <main class="form-panel">
    <form class="form-card" id="loginForm" novalidate>
      <div class="mobile-logo">
        <svg width="34" height="34" viewBox="0 0 64 64"><rect x="7" y="7" width="50" height="50" rx="13" fill="var(--brand)"/><path d="M19 33 l9 9 l17 -19" fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="ko">재고콕<span style="color:var(--brand)">.</span></span>
      </div>

      <h1>로그인</h1>
      <p class="sub">계정 유형을 선택하고 로그인하세요.</p>

      <div class="roletabs" id="roletabs">
        <button type="button" class="roletab on" data-role="OWNER">
          <span class="rt-t">사장님</span><span class="rt-d">전체 관리</span>
        </button>
        <button type="button" class="roletab" data-role="EMPLOYEE">
          <span class="rt-t">직원</span><span class="rt-d">스캔·입출고</span>
        </button>
      </div>

      <div class="form-fields">
        <div class="field">
          <label for="email">이메일</label>
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="m3.5 6.5 8.5 6 8.5-6"/></svg>
            <input class="input" id="email" type="email" placeholder="owner@store.kr" autocomplete="username">
          </div>
          <span class="field-error" id="emailErr" style="display:none;">올바른 이메일을 입력하세요.</span>
        </div>

        <div class="field">
          <div class="row-between">
            <label for="pw">비밀번호</label>
            <a class="link" href="#" onclick="return false;">비밀번호 찾기</a>
          </div>
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
            <input class="input" id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
          </div>
          <span class="field-error" id="pwErr" style="display:none;">비밀번호를 입력하세요.</span>
        </div>

        <label class="checkbox"><input type="checkbox" id="remember" checked>로그인 상태 유지</label>

        <button class="btn btn--lg btn--block" type="submit">로그인</button>
      </div>

      <div class="signup">아직 계정이 없으신가요? <a class="link" href="#" onclick="return false;">사업장 등록하기</a></div>
    </form>
  </main>

</div>

<script>
  const tabs = document.getElementById("roletabs");
  let role = "OWNER";
  tabs.addEventListener("click", (e) => {
    const b = e.target.closest(".roletab");
    if (!b) return;
    role = b.dataset.role;
    tabs.querySelectorAll(".roletab").forEach(t => t.classList.toggle("on", t === b));
    document.getElementById("email").placeholder = role === "OWNER" ? "owner@store.kr" : "name@store.kr";
  });

  const form = document.getElementById("loginForm");
  const email = document.getElementById("email"), pw = document.getElementById("pw");
  const emailErr = document.getElementById("emailErr"), pwErr = document.getElementById("pwErr");
  const reEmail = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;

  function clearErr(input, errEl) {
    input.classList.remove("input--error"); errEl.style.display = "none";
  }
  email.addEventListener("input", () => clearErr(email, emailErr));
  pw.addEventListener("input", () => clearErr(pw, pwErr));

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    let ok = true;
    if (!reEmail.test(email.value.trim())) { email.classList.add("input--error"); emailErr.style.display = "block"; ok = false; }
    if (!pw.value) { pw.classList.add("input--error"); pwErr.style.display = "block"; ok = false; }
    if (!ok) return;
    const btn = form.querySelector('button[type="submit"]');
    btn.textContent = "로그인 중…"; btn.disabled = true;
    setTimeout(() => { window.location.href = "재고콕 프로토타입.html"; }, 700);
  });
</script>
</body>
</html>
